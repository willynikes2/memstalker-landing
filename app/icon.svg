<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Connection lines: inputs to hidden nodes -->
  <line x1="6" y1="8" x2="20" y2="12" stroke="#6366f1" stroke-width="0.7" opacity="0.4"/>
  <line x1="6" y1="8" x2="20" y2="28" stroke="#6366f1" stroke-width="0.7" opacity="0.3"/>
  <line x1="6" y1="20" x2="20" y2="12" stroke="#6366f1" stroke-width="0.7" opacity="0.5"/>
  <line x1="6" y1="20" x2="20" y2="28" stroke="#6366f1" stroke-width="0.7" opacity="0.5"/>
  <line x1="6" y1="32" x2="20" y2="12" stroke="#6366f1" stroke-width="0.7" opacity="0.3"/>
  <line x1="6" y1="32" x2="20" y2="28" stroke="#6366f1" stroke-width="0.7" opacity="0.4"/>
  <!-- Connection lines: hidden nodes to output -->
  <line x1="20" y1="12" x2="34" y2="20" stroke="#818cf8" stroke-width="0.8" opacity="0.5"/>
  <line x1="20" y1="28" x2="34" y2="20" stroke="#818cf8" stroke-width="0.8" opacity="0.5"/>
  <!-- Input layer: 3 nodes (Claude, Codex, Gemini) -->
  <circle cx="6" cy="8" r="2.5" fill="#6366f1" opacity="0.8"/>
  <circle cx="6" cy="20" r="2.5" fill="#6366f1" opacity="0.8"/>
  <circle cx="6" cy="32" r="2.5" fill="#6366f1" opacity="0.8"/>
  <!-- Hidden layer: 2 nodes -->
  <circle cx="20" cy="12" r="3" fill="#818cf8"/>
  <circle cx="20" cy="28" r="3" fill="#818cf8"/>
  <!-- Output layer: 1 node (the brain) -->
  <circle cx="34" cy="20" r="3.5" fill="#a5b4fc"/>
</svg>
